<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christmas Present</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🎄 Christmas Present</h1>

    <h2>BUILD PROGRESS</h2>

    <div class="progress-number">
        18%
    </div>

    <div class="progress">
        <div class="progress-fill"></div>
    </div>

    <p class="status">
        Engineering in Progress...
    </p>

    <hr>

    <div class="info">

        <div>
            <h3>Current Phase</h3>
            <p>Foundation</p>
        </div>

        <div>
            <h3>Next Milestone</h3>
            <p>Architecture</p>
        </div>

    </div>

    <hr>

    <blockquote>
        "Every finished project was once 1% complete."
    </blockquote>

    <hr>

    <div class="footer">

        <div>
            <h3>Build</h3>
            <p>v0.3 Evergreen</p>
        </div>

        <div>
            <h3>Updated</h3>
            <p>July 12, 2026</p>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
