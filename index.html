<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Christmas Present</title>

<style>

body{
    margin:0;
    background:#111827;
    color:white;
    font-family:Arial, Helvetica, sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}

.card{

    width:90%;
    max-width:500px;

    background:#1f2937;

    border-radius:20px;

    padding:40px;

    text-align:center;

    box-shadow:0 0 25px rgba(0,0,0,.4);

}

h1{

    color:#f3f4f6;

    margin-top:0;

}

h2{

    color:#d1d5db;

}

.progress{

    width:100%;

    height:22px;

    background:#374151;

    border-radius:20px;

    overflow:hidden;

    margin-top:20px;

}

.bar{

    width:18%;

    height:100%;

    background:#0ea45b;

}

.small{

    color:#9ca3af;

    font-size:.9em;

}

.quote{

    margin-top:30px;

    font-style:italic;

    color:#d1d5db;

}

.footer{

    margin-top:40px;

    font-size:.8em;

    color:#6b7280;

}

</style>

</head>

<body>

<div class="card">

<h1>🎄 Christmas Present</h1>

<h2>PROJECT STATUS</h2>

<h1>18%</h1>

<div class="progress">

<div class="bar"></div>

</div>

<p>Engineering in Progress</p>

<div class="quote">

"Every finished project was once 1% complete."

</div>

<br>

<p class="small">

Last Updated

<br>

July 12, 2026

</p>

<p class="small">

Next Update

<br>

Friday

</p>

<div class="footer">

Build v0.2-alpha

</div>

</div>

</body>

</html>
